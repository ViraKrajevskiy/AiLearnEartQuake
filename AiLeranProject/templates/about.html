<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📖 EarthquakeAI — Technical Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #010112;
            --panel-bg: rgba(15, 15, 40, 0.85);
            --text: #eef0ff;
            --text-secondary: #a0a5c0;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            --accent: #667eea;
            --accent-alt: #f093fb;
            --glass: rgba(18, 18, 40, 0.75);
            --hover-light: rgba(255, 255, 255, 0.05);
            --scrollbar-thumb: rgba(102, 126, 234, 0.45);
            --scrollbar-track: rgba(255, 255, 255, 0.04);
        }

        body.light-mode {
            --bg: #e8eef7;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text: #1a1c2e;
            --text-secondary: #4a4e6b;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.85);
            --hover-light: rgba(0, 0, 0, 0.03);
            --scrollbar-thumb: rgba(102, 126, 234, 0.4);
            --scrollbar-track: rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s, color 0.4s;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding: 24px 30px;
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-right: auto;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.35);
            white-space: nowrap;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(102, 126, 234, 0.5);
        }
        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            box-shadow: none;
            color: var(--text);
            backdrop-filter: blur(8px);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(102, 126, 234, 0.1);
        }

        .theme-btn, .lang-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.2em;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-btn:hover, .lang-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(102, 126, 234, 0.08);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .tab-btn.active {
            background: rgba(102, 126, 234, 0.25);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
        }
        .tab-btn:hover {
            border-color: var(--accent);
        }
        .tab-btn:active {
            transform: scale(0.97);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }

        .section {
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .section:hover {
            border-color: rgba(102, 126, 234, 0.4);
            box-shadow: 0 25px 60px rgba(102, 126, 234, 0.15);
        }

        .section h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section h3 {
            font-size: 1.3em;
            margin: 20px 0 12px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .section p, .section li {
            font-size: 0.95em;
            line-height: 1.8;
            color: var(--text-secondary);
            margin: 10px 0;
        }

        .section ul, .section ol {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 20px 0;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            min-width: 600px;
        }

        table th {
            background: rgba(102, 126, 234, 0.15);
            padding: 14px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid var(--border);
            color: var(--accent);
        }

        table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        table tr:hover td {
            background: var(--hover-light);
        }

        .formula-box {
            background: rgba(102, 126, 234, 0.08);
            border-left: 4px solid var(--accent);
            padding: 18px;
            border-radius: 12px;
            margin: 18px 0;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
            word-break: break-word;
            -webkit-overflow-scrolling: touch;
        }

        .code-block {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
            font-size: 0.85em;
            margin: 15px 0;
            color: #4CAF50;
            white-space: pre-wrap;
            word-break: break-all;
            -webkit-overflow-scrolling: touch;
        }

        .stat-card {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 15px 0;
            display: inline-block;
            min-width: 200px;
            margin-right: 15px;
            vertical-align: top;
        }

        .stat-card strong {
            display: block;
            font-size: 1.8em;
            color: var(--accent);
            margin: 10px 0;
        }

        .stat-card small {
            color: var(--text-secondary);
            font-size: 0.8em;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .feature-item {
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.2);
            padding: 15px;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .feature-item:hover {
            background: rgba(102, 126, 234, 0.12);
            border-color: var(--accent);
        }

        .feature-item strong {
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .feature-item small {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .warning-box {
            background: rgba(255, 152, 0, 0.12);
            border-left: 4px solid #FF9800;
            padding: 16px;
            border-radius: 12px;
            margin: 15px 0;
            color: var(--text);
        }

        .success-box {
            background: rgba(76, 175, 80, 0.12);
            border-left: 4px solid #4CAF50;
            padding: 16px;
            border-radius: 12px;
            margin: 15px 0;
            color: var(--text);
        }

        /* Mobile scroll hint for tables */
        .table-responsive::after {
            content: '';
            display: none;
        }

        /* ========== MOBILE ADAPTATION ========== */
        @media (max-width: 1024px) {
            .header h1 {
                font-size: 1.8em;
            }

            .tabs {
                gap: 6px;
            }

            .tab-btn {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 16px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                border-radius: 16px;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 1.5em;
                margin-bottom: 0;
            }

            .nav-buttons {
                width: 100%;
                justify-content: flex-start;
                gap: 8px;
            }

            .btn {
                padding: 10px 14px;
                font-size: 0.85em;
                border-radius: 10px;
            }

            .theme-btn, .lang-btn {
                padding: 8px 10px;
                font-size: 1em;
                border-radius: 10px;
            }

            .tabs {
                gap: 4px;
                padding-bottom: 12px;
                margin-bottom: 20px;
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .tabs::-webkit-scrollbar {
                display: none;
            }

            .tab-btn {
                padding: 8px 12px;
                font-size: 0.8em;
                border-radius: 10px;
                flex-shrink: 0;
            }

            .section {
                padding: 20px 16px;
                border-radius: 16px;
                margin-bottom: 16px;
            }

            .section h2 {
                font-size: 1.4em;
                margin-bottom: 16px;
                gap: 8px;
            }

            .section h3 {
                font-size: 1.1em;
                margin: 16px 0 10px;
                gap: 6px;
            }

            .section p, .section li {
                font-size: 0.88em;
                line-height: 1.7;
            }

            .section ul, .section ol {
                margin-left: 18px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stat-card {
                display: block;
                margin-right: 0;
                min-width: 0;
                width: 100%;
                padding: 16px;
            }

            .stat-card strong {
                font-size: 1.5em;
            }

            .code-block {
                font-size: 0.75em;
                padding: 12px;
                border-radius: 10px;
            }

            .formula-box {
                font-size: 0.8em;
                padding: 14px;
                border-radius: 10px;
            }

            .warning-box, .success-box {
                padding: 12px;
                border-radius: 10px;
            }

            /* Table scroll hint for mobile */
            .table-responsive {
                position: relative;
            }
            .table-responsive::after {
                display: block;
                content: '← scroll →';
                text-align: center;
                font-size: 0.7em;
                color: var(--text-secondary);
                opacity: 0.6;
                padding: 8px 0 4px;
                pointer-events: none;
            }

            table {
                font-size: 0.8em;
                min-width: 500px;
            }

            table th, table td {
                padding: 10px 8px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 6px;
            }

            .header {
                padding: 14px 16px;
                border-radius: 14px;
                margin-bottom: 16px;
            }

            .header h1 {
                font-size: 1.3em;
                width: 100%;
            }

            .nav-buttons {
                flex-wrap: wrap;
                gap: 6px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 0.78em;
                border-radius: 8px;
                gap: 4px;
            }

            .theme-btn, .lang-btn {
                padding: 7px 9px;
                font-size: 0.9em;
                border-radius: 8px;
                gap: 4px;
            }

            .tabs {
                gap: 3px;
                padding-bottom: 10px;
                margin-bottom: 14px;
            }

            .tab-btn {
                padding: 6px 10px;
                font-size: 0.75em;
                border-radius: 8px;
            }
            .tab-btn i {
                display: none;
            }

            .section {
                padding: 16px 12px;
                border-radius: 14px;
                margin-bottom: 12px;
            }

            .section h2 {
                font-size: 1.2em;
                margin-bottom: 12px;
            }
            .section h2 i {
                font-size: 0.9em;
            }

            .section h3 {
                font-size: 1em;
                margin: 14px 0 8px;
            }

            .section p, .section li {
                font-size: 0.82em;
                line-height: 1.6;
            }

            .section ul, .section ol {
                margin-left: 14px;
            }

            .feature-item {
                padding: 12px;
                border-radius: 10px;
            }
            .feature-item strong {
                font-size: 0.9em;
            }
            .feature-item small {
                font-size: 0.8em;
            }

            .stat-card {
                padding: 12px;
                margin: 10px 0;
            }
            .stat-card strong {
                font-size: 1.3em;
            }
            .stat-card small {
                font-size: 0.7em;
            }

            .code-block {
                font-size: 0.7em;
                padding: 10px;
                border-radius: 8px;
            }

            .formula-box {
                font-size: 0.75em;
                padding: 10px 12px;
                border-radius: 8px;
            }

            .warning-box, .success-box {
                padding: 10px 12px;
                border-radius: 8px;
                font-size: 0.82em;
            }

            table {
                font-size: 0.72em;
                min-width: 450px;
            }

            table th, table td {
                padding: 8px 6px;
            }
        }

        @media (max-width: 360px) {
            .header {
                padding: 12px;
                border-radius: 12px;
            }

            .header h1 {
                font-size: 1.1em;
            }

            .btn {
                padding: 7px 10px;
                font-size: 0.72em;
            }

            .tab-btn {
                padding: 5px 8px;
                font-size: 0.7em;
            }

            .section {
                padding: 12px 10px;
                border-radius: 12px;
            }

            .section h2 {
                font-size: 1.1em;
            }

            .section h3 {
                font-size: 0.9em;
            }

            .section p, .section li {
                font-size: 0.78em;
            }

            .code-block {
                font-size: 0.65em;
            }

            .formula-box {
                font-size: 0.7em;
            }
        }

        /* Landscape mode adjustments */
        @media (max-width: 900px) and (orientation: landscape) {
            .header {
                flex-direction: row;
                align-items: center;
            }

            .header h1 {
                font-size: 1.3em;
                white-space: nowrap;
            }

            .nav-buttons {
                width: auto;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .section {
                padding: 16px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">📖 EarthquakeAI Documentation</h1>
            <div class="nav-buttons">
                <a href="/" class="btn btn-secondary" id="mapBtn"><i class="fas fa-globe"></i> Map</a>
                <a href="/statistics/" class="btn btn-secondary" id="statsBtn"><i class="fas fa-chart-bar"></i> Stats</a>
                <button class="lang-btn" id="langToggle"><i class="fas fa-language"></i> <span id="langText">RU</span></button>
                <button class="theme-btn" id="themeToggle" title="Toggle Theme"><i class="fas fa-sun"></i></button>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')" id="tabOverview"><i class="fas fa-book"></i> <span>Overview</span></button>
            <button class="tab-btn" onclick="switchTab('datasets')" id="tabDatasets"><i class="fas fa-database"></i> <span>Datasets</span></button>
            <button class="tab-btn" onclick="switchTab('model')" id="tabModel"><i class="fas fa-brain"></i> <span>Model</span></button>
            <button class="tab-btn" onclick="switchTab('features')" id="tabFeatures"><i class="fas fa-sliders-h"></i> <span>Features</span></button>
            <button class="tab-btn" onclick="switchTab('formulas')" id="tabFormulas"><i class="fas fa-calculator"></i> <span>Formulas</span></button>
            <button class="tab-btn" onclick="switchTab('performance')" id="tabPerformance"><i class="fas fa-chart-line"></i> <span>Performance</span></button>
        </div>

        <div id="overview" class="tab-content active"></div>
        <div id="datasets" class="tab-content"></div>
        <div id="model" class="tab-content"></div>
        <div id="features" class="tab-content"></div>
        <div id="formulas" class="tab-content"></div>
        <div id="performance" class="tab-content"></div>
    </div>

    <script>
        // ========== TRANSLATIONS ==========
        const translations = {
            en: {
                pageTitle: '📖 EarthquakeAI Documentation',
                mapBtn: 'Map',
                statsBtn: 'Stats',
                langSwitch: 'RU',
                tabOverview: 'Overview',
                tabDatasets: 'Datasets',
                tabModel: 'Model',
                tabFeatures: 'Features',
                tabFormulas: 'Formulas',
                tabPerformance: 'Performance',
                overview: {
                    title: 'Project Overview',
                    intro: '<strong>EarthquakeAI</strong> is an educational machine learning project that predicts earthquake magnitudes based on historical seismic data and environmental features. The system combines USGS earthquake data with advanced RandomForest regression to provide magnitude predictions with confidence intervals.',
                    techStackTitle: 'Tech Stack',
                    techStack: [
                        '<strong>Backend:</strong> Django 6.0 + Python 3.14 + DRF (Django REST Framework)',
                        '<strong>ML Framework:</strong> scikit-learn (RandomForest, StandardScaler)',
                        '<strong>Frontend:</strong> Three.js (3D Globe), Chart.js (Statistics), Vanilla JavaScript',
                        '<strong>Database:</strong> SQLite3'
                    ],
                    keyComponentsTitle: 'Key Components',
                    keyComponents: [
                        { title: 'RandomForest Model', desc: '150 estimators, max_depth=12, predicting magnitude from seismic features' },
                        { title: 'Feature Scaling', desc: 'StandardScaler normalization for all input features' },
                        { title: 'Confidence Intervals', desc: 'Bootstrap aggregation for uncertainty quantification' },
                        { title: 'REST API', desc: 'POST /api/vibration/ for predictions' },
                        { title: '3D Visualization', desc: 'Interactive globe with earthquake markers' }
                    ]
                },
                datasets: {
                    title: 'Datasets & Data Sources',
                    sourceTitle: 'Primary Data Source: USGS Earthquake Hazards Program',
                    sourceURL: 'URL: https://earthquake.usgs.gov/fdsnws/event/1/query',
                    sourceDesc: 'The USGS provides real-time earthquake data in GeoJSON format. Our training pipeline automatically fetches earthquakes matching:',
                    sourceFilters: [
                        'Minimum magnitude: M 2.5',
                        'Time window: Last 30 days',
                        'Global coverage: All latitudes & longitudes'
                    ],
                    statsTitle: 'Current Dataset Statistics',
                    statsTable: [
                        { metric: 'Total Records', value: '1,600+', notes: 'From last 30 days of USGS data' },
                        { metric: 'Magnitude Range', value: '2.5 – 8.0+', notes: 'Covers all significant events' },
                        { metric: 'Depth Range', value: '0 – 650 km', notes: 'Shallow to deep earthquakes' },
                        { metric: 'Geographic Coverage', value: 'Global (all regions)', notes: 'No geographic filtering' },
                        { metric: 'Mean Magnitude', value: '4.2 ± 1.3', notes: 'Standard deviation included' },
                        { metric: 'Update Frequency', value: 'Hourly', notes: 'Via train_model.py script' }

                    schemaTitle: 'Data Schema',
                    loadingTitle: 'Loading Data Pipeline',
                    loadingCmd: 'Command:',
                    loadingText: 'python load_usgs_data.py or python AiLeranProject/train_model.py',
                    qualityTitle: 'Data Quality Notes',
                    qualityCaveats: [
                        'Magnitude values from USGS (M2.5+ only) — smaller quakes not included',
                        'Depth estimated from seismic waves — ±5 km uncertainty typical',
                        'Location names auto-generated from coordinates — may vary slightly',
                        'Real-time lag: ~2 minutes before USGS publishes final magnitude'
                    ]
                },
                model: {
                    title: 'ML Model Architecture',
                    typeTitle: 'Model Type',
                    typeDesc: '<strong>RandomForestRegressor</strong> from scikit-learn',
                    hyperTitle: 'Hyperparameters',
                    hyperTable: [
                        { param: 'n_estimators', value: '150', rationale: 'Balance between accuracy and training time' },
                        { param: 'max_depth', value: '12', rationale: 'Prevent overfitting while capturing feature interactions' },

                        'Интегрировать данные о границах тектонических плит',
                        'Использовать XGBoost или LightGBM для потенциально лучшей производительности',
                        'Реализовать детекцию аномалий для выбросов прогнозов',
                        'Обучать отдельные модели для каждого сейсмического региона (трансферное обучение)',
                        'Переобучение модели в реальном времени с потоковыми данными USGS'
                    ]
                }
            }
        };

        let currentLang = localStorage.getItem('earthquakeai_lang') || 'en';
        const langToggle = document.getElementById('langToggle');
        const langText = document.getElementById('langText');

        function applyLanguage(lang) {
            const t = translations[lang];
            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.getElementById('mapBtn').innerHTML = `<i class="fas fa-globe"></i> ${t.mapBtn}`;
            document.getElementById('statsBtn').innerHTML = `<i class="fas fa-chart-bar"></i> ${t.statsBtn}`;
            langText.textContent = t.langSwitch;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const span = btn.querySelector('span');
                const icon = btn.querySelector('i');
                const key = btn.id.replace('tab', '').toLowerCase();
                if (t['tab' + key.charAt(0).toUpperCase() + key.slice(1)]) {
                    if (span) span.textContent = t['tab' + key.charAt(0).toUpperCase() + key.slice(1)];
                }
            });

            buildOverview(lang);
            buildDatasets(lang);
            buildModel(lang);
            buildFeatures(lang);
            buildFormulas(lang);
            buildPerformance(lang);
        }

        function wrapTable(html) {
            return `<div class="table-responsive">${html}</div>`;
        }

        function buildOverview(lang) {
            const t = translations[lang].overview;
            const html = `
                <div class="section">
                    <h2><i class="fas fa-info-circle"></i> ${t.title}</h2>
                    <p>${t.intro}</p>
                    <h3><i class="fas fa-cube"></i> ${t.techStackTitle}</h3>
                    <ul>${t.techStack.map(item => `<li>${item}</li>`).join('')}</ul>
                    <h3><i class="fas fa-target"></i> ${t.keyComponentsTitle}</h3>
                    <div class="feature-grid">
                        ${t.keyComponents.map(c => `<div class="feature-item"><strong>${c.title}</strong><small>${c.desc}</small></div>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('overview').innerHTML = html;
        }

        function buildDatasets(lang) {
            const t = translations[lang].datasets;
            const html = `
                <div class="section">
                    <h2><i class="fas fa-database"></i> ${t.title}</h2>
                    <h3><i class="fas fa-globe"></i> ${t.sourceTitle}</h3>
                    <p><strong>${t.sourceURL}</strong></p>
                    <p>${t.sourceDesc}</p>
                    <ul>${t.sourceFilters.map(f => `<li>${f}</li>`).join('')}</ul>
                    <h3><i class="fas fa-chart-bar"></i> ${t.statsTitle}</h3>
                    ${wrapTable(`
                        <table>
                            <thead><tr><th>${lang === 'ru' ? 'Метрика' : 'Metric'}</th><th>${lang === 'ru' ? 'Значение' : 'Value'}</th><th>${lang === 'ru' ? 'Примечания' : 'Notes'}</th></tr></thead>
                            <tbody>${t.statsTable.map(r => `<tr><td><strong>${r.metric}</strong></td><td>${r.value}</td><td>${r.notes}</td></tr>`).join('')}</tbody>
                        </table>
                    `)}
                    <h3><i class="fas fa-cube"></i> ${t.schemaTitle}</h3>
                    <div class="code-block">
{
  "timestamp": "2026-06-20T10:30:45Z",
  "latitude": 41.3,
  "longitude": 69.2,
  "magnitude": 4.5,
  "depth": 15.0,
  "location": "10 km NE of Tashkent, Uzbekistan"
}
                    </div>
                    <h3><i class="fas fa-download"></i> ${t.loadingTitle}</h3>
                    <div class="success-box">
                        <strong>${t.loadingCmd}</strong><br>
                        <code>${t.loadingText}</code>
                    </div>
                    <h3><i class="fas fa-warning"></i> ${t.qualityTitle}</h3>
                    <div class="warning-box">
                        <strong>⚠️ ${lang === 'ru' ? 'Предостережения' : 'Caveats'}:</strong>
                        <ul style="margin: 10px 0;">${t.qualityCaveats.map(c => `<li>${c}</li>`).join('')}</ul>
                    </div>
                </div>
            `;
            document.getElementById('datasets').innerHTML = html;
        }

        function buildModel(lang) {
            const t = translations[lang].model;
            const html = `
                <div class="section">
                    <h2><i class="fas fa-brain"></i> ${t.title}</h2>
                    <h3><i class="fas fa-layer-group"></i> ${t.typeTitle}</h3>
                    <p>${t.typeDesc}</p>
                    <h3><i class="fas fa-cog"></i> ${t.hyperTitle}</h3>
                    ${wrapTable(`
                        <table>
                            <thead><tr><th>${lang === 'ru' ? 'Параметр' : 'Parameter'}</th><th>${lang === 'ru' ? 'Значение' : 'Value'}</th><th>${lang === 'ru' ? 'Обоснование' : 'Rationale'}</th></tr></thead>
                            <tbody>${t.hyperTable.map(r => `<tr><td><strong>${r.param}</strong></td><td>${r.value}</td><td>${r.rationale}</td></tr>`).join('')}</tbody>
                        </table>
                    `)}
                    <h3><i class="fas fa-check-double"></i> ${t.trainingTitle}</h3>
                    <ul>${t.trainingList.map(item => `<li>${item}</li>`).join('')}</ul>
                    <h3><i class="fas fa-chart-line"></i> ${t.performanceTitle}</h3>
                    <div>${t.performanceCards.map(c => `<div class="stat-card">${c.label}<strong>${c.value}</strong><small>${c.unit}</small></div>`).join('')}</div>
                    <h3><i class="fas fa-save"></i> ${t.persistenceTitle}</h3>
                    <ul>${t.persistenceList.map(item => `<li>${item}</li>`).join('')}</ul>
                </div>
            `;
            document.getElementById('model').innerHTML = html;
        }

        function buildFeatures(lang) {
            const t = translations[lang].features;
            const html = `
                <div class="section">
                    <h2><i class="fas fa-sliders-h"></i> ${t.title}</h2>
                    <h3><i class="fas fa-info-circle"></i> ${t.pipelineTitle}</h3>
                    <p>${t.pipelineDesc}</p>
                    <h3><i class="fas fa-list"></i> ${t.featureSetTitle}</h3>
                    ${wrapTable(`
                        <table>
                            <thead><tr><th>${lang === 'ru' ? 'Индекс' : 'Index'}</th><th>${lang === 'ru' ? 'Признак' : 'Feature Name'}</th><th>${lang === 'ru' ? 'Описание' : 'Description'}</th><th>${lang === 'ru' ? 'Диапазон/Единицы' : 'Range/Units'}</th></tr></thead>
                            <tbody>${t.featureTable.map(r => `<tr><td><strong>${r.index}</strong></td><td><strong>${r.name}</strong></td><td>${r.desc}</td><td>${r.range}</td></tr>`).join('')}</tbody>
                        </table>
                    `)}
                    <h3><i class="fas fa-map-pin"></i> ${t.geoParamsTitle}</h3>
                    <ul>${t.geoParamsList.map(item => `<li>${item}</li>`).join('')}</ul>
                    <div class="code-block">
def compute_features(latitude, longitude, depth):
    seven_days_ago = now - timedelta(days=7)

    lat_range = 0.9
    lon_range = 0.9 / cos(radians(latitude))

    nearby = count(earthquakes where
        timestamp >= seven_days_ago AND
        magnitude > 2.0 AND
        lat in [lat±range] AND
        lon in [lon±range])

    last_big = find(earthquakes where
        magnitude >= 4.0 in same region)

    time_since = (now - last_big.timestamp).days / 365.25

    return [nearby, depth, time_since, latitude, longitude]
                    </div>
                    <h3><i class="fas fa-balance-scale"></i> ${t.scalingTitle}</h3>
                    <p>${t.scalingDesc}</p>
                    <div class="formula-box">${t.scalingFormula}</div>
                    <p>${t.scalingNote}</p>
                </div>
            `;
            document.getElementById('features').innerHTML = html;
        }

        function buildFormulas(lang) {
            const t = translations[lang].formulas;
            const html = `
                <div class="section">
                    <h2><i class="fas fa-calculator"></i> ${t.title}</h2>
                    <h3><i class="fas fa-mountain"></i> ${t.magPredTitle}</h3>
                    <div class="formula-box">${t.magPredFormula}</div>
                    <h3><i class="fas fa-percent"></i> ${t.confidenceTitle}</h3>
                    <div class="formula-box">${t.confidenceFormula}</div>
                    <h3><i class="fas fa-expand"></i> ${t.rangeTitle}</h3>
                    <div class="formula-box">${t.rangeFormula}</div>
                    <h3><i class="fas fa-location-dot"></i> ${t.locationUncertTitle}</h3>
                    <div class="formula-box">${t.locationUncertFormula}</div>
                    <h3><i class="fas fa-square-root-variable"></i> ${t.rmseTitle}</h3>
                    <div class="formula-box">${t.rmseFormula}</div>
                    <h3><i class="fas fa-cube"></i> ${t.scalingFormulaTitle}</h3>
                    <div class="formula-box">${t.scalingFormulaText}</div>
                    <h3><i class="fas fa-chart-pie"></i> ${t.baggingTitle}</h3>
                    <p>${t.baggingDesc}</p>
                    <div class="formula-box">${t.baggingFormula}</div>
                </div>
            `;
            document.getElementById('formulas').innerHTML = html;
        }

        function buildPerformance(lang) {
            const t = translations[lang].performance;
            const html = `
                <div class="section">
                    <h2><i class="fas fa-chart-line"></i> ${t.title}</h2>
                    <h3><i class="fas fa-metrics"></i> ${t.keyMetricsTitle}</h3>
                    ${wrapTable(`
                        <table>
                            <thead><tr><th>${lang === 'ru' ? 'Метрика' : 'Metric'}</th><th>${lang === 'ru' ? 'Значение' : 'Value'}</th><th>${lang === 'ru' ? 'Интерпретация' : 'Interpretation'}</th></tr></thead>
                            <tbody>${t.keyMetricsTable.map(r => `<tr><td><strong>${r.metric}</strong></td><td><strong>${r.value}</strong></td><td>${r.interpretation}</td></tr>`).join('')}</tbody>
                        </table>
                    `)}
                    <h3><i class="fas fa-microscope"></i> ${t.cvResultsTitle}</h3>
                    <div class="success-box">${t.cvResultsText}</div>
                    <h3><i class="fas fa-search-plus"></i> ${t.featureImportanceTitle}</h3>
                    <p>${t.featureImportanceDesc}</p>
                    <ul>${t.featureImportanceList.map(item => `<li>${item}</li>`).join('')}</ul>
                    <h3><i class="fas fa-warning"></i> ${t.limitationsTitle}</h3>
                    <div class="warning-box"><ul style="margin: 10px 0;">${t.limitationsList.map(item => `<li>${item}</li>`).join('')}</ul></div>
                    <h3><i class="fas fa-rocket"></i> ${t.improvementsTitle}</h3>
                    <ul>${t.improvementsList.map(item => `<li>${item}</li>`).join('')}</ul>
                </div>
            `;
            document.getElementById('performance').innerHTML = html;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');

            // Scroll to top of content on mobile
            if (window.innerWidth <= 768) {
                document.getElementById(tabName).scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        function setTheme(isLight) {
            document.body.classList.toggle('light-mode', isLight);
            icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('light-mode')));
        if (localStorage.getItem('theme') === 'light') setTheme(true);

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            localStorage.setItem('earthquakeai_lang', currentLang);
            applyLanguage(currentLang);
        });

        applyLanguage(currentLang);
    </script>
</body>
</html>
